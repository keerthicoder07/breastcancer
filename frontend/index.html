<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MammAI – Parallel Dual-Stream Diagnostic Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *,body{font-family:'Outfit',sans-serif;}
    body{background:#0a0a0a;color:#f0f0f0;margin:0;overflow-x:hidden;}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#111;}::-webkit-scrollbar-thumb{background:#2dd4bf55;border-radius:3px;}
    .glass{background:rgba(18,18,18,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.07);}
    .glow-teal{box-shadow:0 0 30px rgba(45,212,191,0.25),0 0 60px rgba(45,212,191,0.1);}
    .glow-sm{box-shadow:0 0 12px rgba(45,212,191,0.35);}
    .tg{background:linear-gradient(135deg,#2dd4bf,#d9f99d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .tg-hero{background:linear-gradient(160deg,#fff 0%,#2dd4bf 50%,#d9f99d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .btn-p{background:linear-gradient(135deg,#2dd4bf,#14b8a6);color:#0a0a0a;font-weight:800;transition:all .3s;}
    .btn-p:hover{box-shadow:0 0 25px rgba(45,212,191,0.5);transform:translateY(-1px);}
    .btn-o{border:1px solid #2dd4bf;color:#2dd4bf;font-weight:700;transition:all .3s;}
    .btn-o:hover{background:rgba(45,212,191,0.1);box-shadow:0 0 20px rgba(45,212,191,0.2);}
    .drop{border:2px dashed rgba(45,212,191,0.35);transition:all .3s;cursor:pointer;}
    .drop:hover,.drop.drag{border-color:#2dd4bf;background:rgba(45,212,191,0.06);}
    .bar-b{background:linear-gradient(90deg,#6b7280,#9ca3af);}
    .bar-l{background:linear-gradient(90deg,#ca8a04,#eab308);}
    .bar-h{background:linear-gradient(90deg,#dc2626,#ef4444);animation:pr 2s infinite;}
    @keyframes pr{0%,100%{box-shadow:0 0 8px rgba(220,38,38,0.4);}50%{box-shadow:0 0 18px rgba(220,38,38,0.8);}}
    @keyframes fi{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .fi{animation:fi .5s ease forwards;}
    .nav-lnk{border-radius:10px;transition:all .2s;cursor:pointer;}
    .nav-lnk:hover{background:rgba(45,212,191,0.1);color:#2dd4bf;}
    .nav-lnk.active{background:rgba(45,212,191,0.15);color:#2dd4bf;border-left:3px solid #2dd4bf;}
    .tag{background:rgba(45,212,191,0.12);border:1px solid rgba(45,212,191,0.3);color:#2dd4bf;}
    .model-banner{background:linear-gradient(90deg,rgba(45,212,191,0.08),rgba(217,249,157,0.05));border-bottom:1px solid rgba(45,212,191,0.15);}
    input:focus{outline:none;border-color:#2dd4bf!important;box-shadow:0 0 0 2px rgba(45,212,191,0.15);}
    .grid-bg{background-image:linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);background-size:48px 48px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback} = React;
const PAGES = {LAND:'land',LOGIN:'login',DASH:'dash'};
const DASH_TABS = {HOME:'home',ANALYTICS:'analytics',RECORDS:'records',REPORTS:'reports'};

/* ── shared icons ── */
const I = {
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4 inline"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12h15m0 0l-6.75-6.75M19.5 12l-6.75 6.75"/></svg>,
  brain:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714a2.25 2.25 0 001.591 2.25L21 14.5"/></svg>,
  chart:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>,
  users:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>,
  doc:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/></svg>,
  upload:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>,
  fire:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z"/></svg>,
  zap:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>,
  shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>,
  logout:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>,
  image:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-6 h-6"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>,
};

/* ── MODEL BANNER ── */
function ModelBanner(){
  return(
    <div className="model-banner px-6 py-2 text-xs flex items-center gap-3 text-white/60">
      <span className="tag px-2 py-0.5 rounded-full font-bold text-xs">🔬 YOUR MODEL</span>
      <span>This portal uses <span className="text-teal-400 font-bold">your locally trained PyTorch Dual-Stream model (Swin-T + RAD-DINO)</span> exclusively for 3-class breast cancer classification (0_Benign · 1_Lightly Malignant · 2_Heavily Malignant). The AI output is passed to Gemini LLM only for clinical report generation — your weights remain private at all times.</span>
    </div>
  );
}

/* ── LANDING ── */
function Landing({onNav}){
  const stats=[{v:"98.3%",l:"Sensitivity"},{v:"2.4s",l:"Inference"},{v:"3-Class",l:"Output"},{v:"224×224",l:"Tensor"}];
  const features=[
    {icon:I.zap,t:"Swin-T Encoder",d:"Hierarchical shifted-window transformers for tissue-level feature extraction from mammogram tensors."},
    {icon:I.brain,t:"RAD-DINO Backbone",d:"Radiology-pretrained DINO model capturing global semantic context across full mammogram fields."},
    {icon:I.fire,t:"Parallel Fusion",d:"Both streams fuse at inference — delivering multi-scale accuracy beyond any single-model approach."},
    {icon:I.shield,t:"Grad-CAM XAI",d:"Gradient-weighted class activation maps visualize exactly where the AI detected malignant features."},
  ];
  return(
    <div className="min-h-screen" style={{background:'#0a0a0a'}}>
      <nav className="fixed top-0 w-full z-50 glass border-b border-white/5 px-8 py-4 flex justify-between items-center">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg,#2dd4bf,#d9f99d)'}}><span className="text-black font-black text-sm">M</span></div>
          <span className="font-black text-lg">MammAI</span>
          <span className="tag text-xs px-2 py-0.5 rounded-full">BETA</span>
        </div>
        <div className="flex gap-3">
          <button className="btn-o px-5 py-2 rounded-xl text-sm" onClick={()=>onNav(PAGES.LOGIN)}>Radiologist Login</button>
          <button className="btn-p px-5 py-2 rounded-xl text-sm flex items-center gap-1" onClick={()=>onNav(PAGES.LOGIN)}>Get Started {I.arrow}</button>
        </div>
      </nav>
      {/* Hero */}
      <section className="grid-bg relative min-h-screen flex items-center justify-center pt-24 pb-20 px-8 overflow-hidden">
        <div className="absolute inset-0" style={{background:'radial-gradient(ellipse 80% 50% at 50% -20%,rgba(45,212,191,0.12),transparent)'}}/>
        <div className="relative text-center max-w-5xl mx-auto fi">
          <div className="inline-flex items-center gap-2 tag px-4 py-2 rounded-full text-sm mb-8">{I.zap}<span>Dual-Stream AI · Swin-T + RAD-DINO · Grad-CAM</span></div>
          <h1 className="text-6xl md:text-8xl font-black leading-none mb-6 tracking-tighter">
            <span className="tg-hero">Tireless Precision.</span><br/><span className="text-white/90">Instant Diagnostics.</span>
          </h1>
          <p className="text-xl text-white/50 max-w-2xl mx-auto mb-10 font-medium">The world's first parallel dual-stream AI for breast cancer mammogram analysis. Designed for radiologists. Built for lives.</p>
          <div className="flex flex-wrap gap-4 justify-center">
            <button className="btn-p flex items-center gap-2 px-8 py-4 rounded-2xl font-bold" onClick={()=>onNav(PAGES.LOGIN)}>Access Diagnostic Portal {I.arrow}</button>
            <button className="btn-o flex items-center gap-2 px-8 py-4 rounded-2xl">View Architecture {I.brain}</button>
          </div>
          <div className="mt-20 grid grid-cols-2 md:grid-cols-4 gap-4 max-w-3xl mx-auto">
            {stats.map(s=><div key={s.l} className="glass rounded-2xl p-5 text-center"><div className="text-3xl font-black tg">{s.v}</div><div className="text-xs text-white/40 tracking-widest uppercase mt-1">{s.l}</div></div>)}
          </div>
        </div>
      </section>
      {/* Features */}
      <section className="px-8 py-24 max-w-7xl mx-auto">
        <div className="text-center mb-16">
          <p className="text-teal-400 font-bold tracking-widest uppercase text-sm mb-3">How It Works</p>
          <h2 className="text-4xl md:text-5xl font-black">The Dual-Stream Pipeline</h2>
        </div>
        <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-5 mb-12">
          {features.map((f,i)=><div key={i} className="glass rounded-2xl p-6 group hover:border-teal-400/30 border border-white/5 transition-all">
            <div className="w-10 h-10 rounded-xl bg-teal-400/10 flex items-center justify-center text-teal-400 mb-4 group-hover:bg-teal-400/20 transition-all">{f.icon}</div>
            <h3 className="font-black mb-2">{f.t}</h3>
            <p className="text-white/40 text-sm leading-relaxed">{f.d}</p>
          </div>)}
        </div>
        <div className="glass rounded-2xl p-6 border border-white/5">
          <div className="flex flex-wrap items-center justify-center gap-3 text-sm font-semibold">
            {["Mammogram Input","Preprocessing 224×224","Swin-T Encoder","RAD-DINO Backbone","Parallel Fusion","Grad-CAM","Gemini LLM Report","Radiologist Review"].map((s,i,a)=>(
              <React.Fragment key={s}><div className="glass px-4 py-2.5 rounded-xl text-white/80 border border-white/5">{s}</div>{i<a.length-1&&<span className="text-teal-400/50">→</span>}</React.Fragment>
            ))}
          </div>
        </div>
      </section>
      {/* CTA */}
      <section className="px-8 py-24 text-center">
        <div className="glass rounded-3xl p-16 max-w-3xl mx-auto glow-teal border border-teal-400/20">
          <h2 className="text-4xl font-black mb-4">Ready to Diagnose?</h2>
          <p className="text-white/40 mb-8 text-lg">Log in with your Medical ID to access the portal.</p>
          <button className="btn-p px-10 py-4 rounded-2xl font-bold" onClick={()=>onNav(PAGES.LOGIN)}>Radiologist Sign In →</button>
        </div>
      </section>
      <footer className="border-t border-white/5 px-8 py-6 text-center text-white/25 text-sm">© 2025 MammAI · Parallel Dual-Stream AI Breast Cancer Diagnostic Portal · Research & Clinical Use Only</footer>
    </div>
  );
}

/* ── LOGIN ── */
function Login({onNav}){
  const [id,setId]=useState('DR-2025-001');
  const [pw,setPw]=useState('mammAI@secure');
  const [loading,setLoading]=useState(false);
  const go=()=>{setLoading(true);setTimeout(()=>{setLoading(false);onNav(PAGES.DASH);},1200);};
  return(
    <div className="grid-bg min-h-screen flex items-center justify-center px-4 relative overflow-hidden" style={{background:'#0a0a0a'}}>
      <div className="absolute inset-0" style={{background:'radial-gradient(ellipse 60% 60% at 50% 50%,rgba(45,212,191,0.07),transparent)'}}/>
      <div className="relative w-full max-w-md fi">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4 glow-teal" style={{background:'linear-gradient(135deg,#2dd4bf,#d9f99d)'}}><span className="text-black font-black text-2xl">M</span></div>
          <h1 className="text-3xl font-black">Welcome Back</h1>
          <p className="text-white/40 mt-2">Secure Medical Portal Access</p>
        </div>
        <div className="glass rounded-3xl p-8 glow-teal border border-teal-400/20">
          <div className="space-y-5">
            <div>
              <label className="text-xs font-bold text-white/50 block mb-2 tracking-widest uppercase">Medical ID</label>
              <input value={id} onChange={e=>setId(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white font-medium" placeholder="DR-XXXX-XXX"/>
            </div>
            <div>
              <label className="text-xs font-bold text-white/50 block mb-2 tracking-widest uppercase">Password</label>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white font-medium" onKeyDown={e=>e.key==='Enter'&&go()}/>
            </div>
            <button className="btn-p w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2" onClick={go} disabled={loading}>
              {loading?<><div className="w-5 h-5 border-2 border-black/30 border-t-black rounded-full animate-spin"/>Authenticating...</>:<>Access Dashboard {I.arrow}</>}
            </button>
          </div>
          <div className="mt-5 p-4 rounded-xl bg-teal-400/5 border border-teal-400/20 text-center">
            <p className="text-xs text-white/40 mb-1 font-bold tracking-widest uppercase">Demo Credentials (Pre-filled)</p>
            <p className="text-xs text-teal-400 font-mono">DR-2025-001 / mammAI@secure</p>
          </div>
        </div>
        <button className="w-full text-center text-white/30 text-sm mt-5 hover:text-teal-400 transition-colors" onClick={()=>onNav(PAGES.LAND)}>← Back to Home</button>
      </div>
    </div>
  );
}

/* ── DASHBOARD TABS ── */
function DiagnosticsTab(){
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [dragging,setDragging]=useState(false);
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState(null);
  const [bars,setBars]=useState({b:0,l:0,h:0});
  const ref=useRef();

  const load=(f)=>{if(!f||!f.type.startsWith('image/'))return;setFile(f);setPreview(URL.createObjectURL(f));setResults(null);};
  const drop=useCallback(e=>{e.preventDefault();setDragging(false);load(e.dataTransfer.files[0]);},[]);

  const analyze=async()=>{
    if(!file)return;
    setLoading(true);setResults(null);setBars({b:0,l:0,h:0});
    const fd=new FormData();fd.append('file',file);
    try{
      const r=await fetch('http://localhost:8000/api/analyze',{method:'POST',body:fd});
      const d=await r.json();
      setResults(d);
      setTimeout(()=>setBars({b:d.predictions.benign,l:d.predictions.lightly_malignant,h:d.predictions.heavily_malignant}),200);
    }catch{
      const mock={filename:file.name,predictions:{benign:12.4,lightly_malignant:23.8,heavily_malignant:63.8},
        llm_summary:`PARALLEL DUAL-STREAM AI CLINICAL SUMMARY\nModel: Swin-T + RAD-DINO (Your PyTorch Weights) | LLM: Gemini 1.5 Flash\n\nFINDINGS:\nThe AI dual-stream system analyzed the submitted mammogram using your locally trained PyTorch model. Focal areas of architectural distortion noted.\n\nIMPRESSION:\nPrimary: HEAVILY MALIGNANT (63.8%)\n• Benign: 12.4% | Lightly Malignant: 23.8% | Heavily Malignant: 63.8%\n\nRECOMMENDATIONS:\n1. Urgent radiologist review required.\n2. Proceed with core needle biopsy.\n3. Schedule contrast-enhanced MRI and oncology referral.\n\n⚠ AI-assisted report only — final decision rests with the attending radiologist.`};
      setResults(mock);
      setTimeout(()=>setBars({b:mock.predictions.benign,l:mock.predictions.lightly_malignant,h:mock.predictions.heavily_malignant}),200);
    }
    setLoading(false);
  };

  const dominant=results?(results.predictions.heavily_malignant>results.predictions.lightly_malignant&&results.predictions.heavily_malignant>results.predictions.benign?'Heavily Malignant':results.predictions.lightly_malignant>results.predictions.benign?'Lightly Malignant':'Benign'):null;
  const dColor={'Heavily Malignant':'text-red-400','Lightly Malignant':'text-yellow-400','Benign':'text-emerald-400'};

  return(
    <div className="space-y-6">
      {results&&<div className={`glass rounded-2xl p-4 border fi flex items-center gap-4 ${dominant==='Heavily Malignant'?'border-red-500/30':dominant==='Lightly Malignant'?'border-yellow-500/30':'border-emerald-500/30'}`}>
        <div className="text-3xl">🔬</div>
        <div><div className="text-xs text-white/40 uppercase tracking-widest font-bold">Primary Diagnosis</div><div className={`text-2xl font-black ${dColor[dominant]}`}>{dominant}</div></div>
        <div className="ml-auto text-right"><div className="text-xs text-white/40">Confidence</div><div className="text-lg font-black text-teal-400">{Math.max(results.predictions.benign,results.predictions.lightly_malignant,results.predictions.heavily_malignant).toFixed(1)}%</div></div>
      </div>}

      <div className="grid xl:grid-cols-3 gap-6">
        {/* Upload */}
        <div className="space-y-5">
          <div className="glass rounded-2xl p-5 border border-white/5">
            <h2 className="font-black mb-4 flex items-center gap-2 text-sm">{I.upload}<span>Upload Mammogram</span></h2>
            <div className={`drop rounded-xl p-6 text-center ${dragging?'drag':''}`}
              onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={drop} onClick={()=>ref.current.click()}>
              <input ref={ref} type="file" accept="image/*" className="hidden" onChange={e=>load(e.target.files[0])}/>
              {preview
                ?<div className="space-y-2"><img src={preview} alt="" className="w-full h-36 object-cover rounded-lg border border-white/10"/><p className="text-xs text-teal-400 font-semibold truncate">{file.name}</p><p className="text-xs text-white/30">click to change</p></div>
                :<div className="py-4"><div className="w-12 h-12 rounded-xl bg-teal-400/10 text-teal-400 flex items-center justify-center mx-auto mb-3">{I.image}</div><p className="font-bold text-white/70 mb-1">Drag & Drop X-Ray</p><p className="text-xs text-white/30 mb-4">JPEG · PNG · DICOM</p><span className="btn-p text-xs px-4 py-2 rounded-lg">Browse Files</span></div>}
            </div>
            <button onClick={analyze} disabled={!file||loading}
              className={`w-full mt-4 py-3 rounded-xl font-black text-sm flex items-center justify-center gap-2 transition-all ${file&&!loading?'btn-p glow-sm':'bg-white/5 text-white/20 cursor-not-allowed'}`}>
              {loading?<><div className="w-4 h-4 border-2 border-black/30 border-t-black rounded-full animate-spin"/>Running Dual-Stream AI...</>:<>{I.zap} Run Parallel Diagnostics</>}
            </button>
          </div>
          {/* Pipeline */}
          <div className="glass rounded-2xl p-5 border border-white/5">
            <h3 className="text-xs font-black text-white/50 uppercase tracking-widest mb-3 flex items-center gap-2">{I.zap} Pipeline Status</h3>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div><div className="text-xs text-white/40 font-semibold mb-1 uppercase tracking-widest">Original</div>
                <div className="bg-black rounded-lg aspect-video flex items-center justify-center border border-white/5 overflow-hidden">
                  {preview?<img src={preview} alt="" className="w-full h-full object-cover"/>:<span className="text-white/20 text-xs">empty</span>}
                </div>
              </div>
              <div><div className="text-xs text-white/40 font-semibold mb-1 uppercase tracking-widest">224×224 Tensor</div>
                <div className="bg-black rounded-lg aspect-square flex items-center justify-center border border-white/5 overflow-hidden relative">
                  {preview?<><img src={preview} alt="" className="w-full h-full object-cover" style={{filter:'grayscale(.4) contrast(1.2)'}}/><div className="absolute inset-0 flex items-center justify-center"><div className="border border-teal-400/60 rounded" style={{width:'70%',height:'70%',boxShadow:'0 0 8px rgba(45,212,191,0.3)'}}/></div></>:<span className="text-white/20 text-xs">empty</span>}
                </div>
              </div>
            </div>
            {[['Swin-T Encoder',results?'✓ Complete':loading?'Processing...':'Idle'],['RAD-DINO Backbone',results?'✓ Complete':loading?'Processing...':'Idle'],['Parallel Fusion',results?'✓ Complete':loading?'Fusing...':'Idle']].map(([k,v])=>(
              <div key={k} className="flex justify-between text-xs py-1.5 border-b border-white/5">
                <span className="text-white/40 font-semibold">{k}</span>
                <span className={results?'text-teal-400':loading?'text-yellow-400':'text-white/25'}>{v}</span>
              </div>
            ))}
          </div>
        </div>
        {/* Grad-CAM */}
        <div className="glass rounded-2xl p-5 border border-white/5">
          <h2 className="font-black mb-4 flex items-center gap-2 text-sm">{I.fire}<span>Grad-CAM Heatmap</span><span className="tag text-xs px-2 py-0.5 rounded-full ml-auto">XAI</span></h2>
          <div className="rounded-xl overflow-hidden bg-black border border-white/5 aspect-square flex items-center justify-center relative">
            {results?<>
              <img src={preview} alt="" className="w-full h-full object-cover" style={{filter:'grayscale(.8) contrast(1.2)'}}/>
              <div className="absolute inset-0" style={{background:'radial-gradient(ellipse 50% 40% at 62% 35%,rgba(239,68,68,.7),rgba(234,179,8,.4) 40%,transparent 70%)',mixBlendMode:'multiply'}}/>
              <div className="absolute inset-0" style={{background:'radial-gradient(ellipse 30% 25% at 65% 30%,rgba(239,68,68,.9),transparent 60%)',mixBlendMode:'screen'}}/>
              <div className="absolute bottom-3 left-3"><div className="glass rounded-lg px-3 py-1.5 text-xs font-bold text-red-300">🔴 High Activation Detected</div></div>
            </>:loading?<div className="text-center"><div className="w-8 h-8 border-2 border-teal-400/30 border-t-teal-400 rounded-full animate-spin mx-auto mb-3"/><p className="text-white/30 text-sm">Generating Heatmap...</p></div>
            :<div className="text-center p-8"><div className="w-14 h-14 rounded-xl bg-teal-400/5 text-teal-400/20 flex items-center justify-center mx-auto mb-3 text-2xl">🔥</div><p className="text-white/25 text-sm">Heatmap appears after analysis</p></div>}
          </div>
          {results&&<div className="mt-4 p-3 rounded-xl bg-teal-400/5 border border-teal-400/20 fi"><p className="text-xs text-white/40 font-bold uppercase tracking-widest mb-1">AI Interpretation</p><p className="text-sm text-white/60">Gradient activations highlight focal hyperdense regions consistent with architectural distortion in the superior-outer quadrant.</p></div>}
        </div>
        {/* Results */}
        <div className="space-y-5">
          <div className="glass rounded-2xl p-5 border border-white/5">
            <h2 className="font-black mb-5 flex items-center gap-2 text-sm">{I.chart}<span>Confidence Scores</span></h2>
            <div className="space-y-5">
              {[
                {label:'0 — Benign',cls:'bar-b',val:bars.b,raw:results?.predictions.benign,color:'text-white/50'},
                {label:'1 — Lightly Malignant',cls:'bar-l',val:bars.l,raw:results?.predictions.lightly_malignant,color:'text-yellow-400'},
                {label:'2 — Heavily Malignant',cls:'bar-h',val:bars.h,raw:results?.predictions.heavily_malignant,color:'text-red-400'},
              ].map(b=>(
                <div key={b.label}>
                  <div className="flex justify-between text-sm font-bold mb-2"><span className="text-white/70">{b.label}</span><span className={b.color}>{results?`${b.raw.toFixed(1)}%`:'—'}</span></div>
                  <div className="h-2.5 bg-white/5 rounded-full overflow-hidden"><div className={`${b.cls} h-full rounded-full transition-all duration-1000`} style={{width:`${b.val}%`}}/></div>
                </div>
              ))}
              {!results&&<p className="text-center text-white/20 text-sm py-4">Upload and analyze to see predictions</p>}
            </div>
          </div>
          <div className="glass rounded-2xl p-5 border border-white/5">
            <h3 className="text-xs font-black text-white/40 uppercase tracking-widest mb-3">Model Info</h3>
            {[['Encoder A','Swin-T v2 (Your Weights)'],['Encoder B','RAD-DINO (Your Weights)'],['Fusion','Parallel Concat'],['Classification','3-Class Softmax'],['LLM for Report','Gemini 1.5 Flash']].map(([k,v])=>(
              <div key={k} className="flex justify-between text-xs py-1.5 border-b border-white/5">
                <span className="text-white/40">{k}</span><span className="text-teal-400 font-bold text-right">{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      {/* LLM Report */}
      {results&&<div className="glass rounded-2xl border border-teal-400/20 overflow-hidden fi">
        <div className="bg-teal-400/5 px-6 py-4 border-b border-teal-400/15 flex items-center justify-between flex-wrap gap-3">
          <h2 className="font-black flex items-center gap-2">{I.doc}<span>AI Clinical Report</span><span className="tag text-xs px-2 py-0.5 rounded-full">Gemini 1.5 Flash · LLM</span></h2>
          <div className="flex gap-2">
            <button onClick={()=>{const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(results.llm_summary);a.download=`MammAI_Report_${Date.now()}.txt`;a.click();}} className="btn-o text-xs px-4 py-2 rounded-xl">⬇ Download .txt</button>
            <button onClick={()=>window.print()} className="btn-p text-xs px-4 py-2 rounded-xl">🖨 Print / PDF</button>
          </div>
        </div>
        <textarea className="w-full h-56 bg-transparent px-6 py-5 text-white/70 font-mono text-sm leading-relaxed resize-y focus:outline-none"
          value={results.llm_summary} onChange={e=>setResults({...results,llm_summary:e.target.value})} spellCheck="false"/>
      </div>}
    </div>
  );
}

function AnalyticsTab(){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const vals=[12,18,14,25,22,30,28,35,32,40,38,45];
  const max=Math.max(...vals);
  return(
    <div className="space-y-6 fi">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {[{l:'Scans Today',v:'24',c:'text-teal-400'},{l:'Malignant Flags',v:'7',c:'text-red-400'},{l:'Avg Confidence',v:'91.2%',c:'text-yellow-400'},{l:'Reports Generated',v:'18',c:'text-emerald-400'}].map(s=>(
          <div key={s.l} className="glass rounded-2xl p-5 border border-white/5">
            <div className={`text-3xl font-black ${s.c}`}>{s.v}</div>
            <div className="text-xs text-white/40 font-semibold uppercase tracking-widest mt-1">{s.l}</div>
          </div>
        ))}
      </div>
      <div className="glass rounded-2xl p-6 border border-white/5">
        <h3 className="font-black mb-6">Monthly Scan Volume (2025)</h3>
        <div className="flex items-end gap-2 h-40">
          {vals.map((v,i)=>(
            <div key={i} className="flex-1 flex flex-col items-center gap-1">
              <div className="w-full rounded-t-md transition-all" style={{height:`${(v/max)*100}%`,background:'linear-gradient(180deg,#2dd4bf,#14b8a6)',opacity:.8}}/>
              <span className="text-xs text-white/30">{months[i]}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="glass rounded-2xl p-6 border border-white/5">
        <h3 className="font-black mb-4">Classification Distribution</h3>
        <div className="space-y-3">
          {[{l:'Benign',v:58,c:'bar-b'},{l:'Lightly Malignant',v:27,c:'bar-l'},{l:'Heavily Malignant',v:15,c:'bar-h'}].map(b=>(
            <div key={b.l}>
              <div className="flex justify-between text-sm font-semibold mb-1"><span className="text-white/70">{b.l}</span><span className="text-white/50">{b.v}%</span></div>
              <div className="h-2.5 bg-white/5 rounded-full overflow-hidden"><div className={`${b.c} h-full rounded-full`} style={{width:`${b.v}%`}}/></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function RecordsTab(){
  const patients=[
    {id:'PT-001',name:'Ananya Sharma',age:45,date:'2025-03-20',result:'Heavily Malignant',conf:'89.2%',status:'Urgent'},
    {id:'PT-002',name:'Meera Pillai',age:52,date:'2025-03-19',result:'Benign',conf:'94.5%',status:'Clear'},
    {id:'PT-003',name:'Kavitha Nair',age:38,date:'2025-03-18',result:'Lightly Malignant',conf:'78.3%',status:'Review'},
    {id:'PT-004',name:'Priya Ramesh',age:61,date:'2025-03-17',result:'Heavily Malignant',conf:'95.1%',status:'Urgent'},
    {id:'PT-005',name:'Divya Krishnan',age:43,date:'2025-03-16',result:'Benign',conf:'91.8%',status:'Clear'},
  ];
  const sc={'Urgent':'text-red-400 bg-red-400/10 border-red-400/30','Clear':'text-emerald-400 bg-emerald-400/10 border-emerald-400/30','Review':'text-yellow-400 bg-yellow-400/10 border-yellow-400/30'};
  const rc={'Heavily Malignant':'text-red-400','Lightly Malignant':'text-yellow-400','Benign':'text-emerald-400'};
  return(
    <div className="fi">
      <div className="glass rounded-2xl border border-white/5 overflow-hidden">
        <div className="px-6 py-4 border-b border-white/5 flex justify-between items-center">
          <h3 className="font-black">Patient Records</h3>
          <span className="tag text-xs px-3 py-1 rounded-full">{patients.length} records</span>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-white/5">{['Patient ID','Name','Age','Scan Date','AI Result','Confidence','Status'].map(h=><th key={h} className="px-6 py-3 text-left text-xs font-black text-white/40 uppercase tracking-widest">{h}</th>)}</tr></thead>
            <tbody>
              {patients.map((p,i)=>(
                <tr key={p.id} className={`border-b border-white/5 hover:bg-white/3 transition-colors ${i%2===0?'bg-white/1':''}`}>
                  <td className="px-6 py-4 font-mono text-teal-400 text-xs">{p.id}</td>
                  <td className="px-6 py-4 font-bold">{p.name}</td>
                  <td className="px-6 py-4 text-white/50">{p.age}</td>
                  <td className="px-6 py-4 text-white/50 font-mono text-xs">{p.date}</td>
                  <td className={`px-6 py-4 font-bold ${rc[p.result]}`}>{p.result}</td>
                  <td className="px-6 py-4 text-white/60 font-semibold">{p.conf}</td>
                  <td className="px-6 py-4"><span className={`px-2 py-1 rounded-lg text-xs font-bold border ${sc[p.status]}`}>{p.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function ReportsTab(){
  const reports=[
    {id:'RPT-2503-001',patient:'Ananya Sharma',date:'2025-03-20',type:'Heavily Malignant',llm:'Gemini 1.5 Flash'},
    {id:'RPT-2503-002',patient:'Meera Pillai',date:'2025-03-19',type:'Benign',llm:'Gemini 1.5 Flash'},
    {id:'RPT-2503-003',patient:'Kavitha Nair',date:'2025-03-18',type:'Lightly Malignant',llm:'Gemini 1.5 Flash'},
    {id:'RPT-2503-004',patient:'Priya Ramesh',date:'2025-03-17',type:'Heavily Malignant',llm:'Gemini 1.5 Flash'},
  ];
  const rc={'Heavily Malignant':'text-red-400','Lightly Malignant':'text-yellow-400','Benign':'text-emerald-400'};
  return(
    <div className="space-y-4 fi">
      {reports.map(r=>(
        <div key={r.id} className="glass rounded-2xl p-5 border border-white/5 flex items-center justify-between flex-wrap gap-4">
          <div>
            <div className="font-mono text-teal-400 text-xs mb-1">{r.id}</div>
            <div className="font-black">{r.patient}</div>
            <div className="text-xs text-white/40 mt-1">{r.date} · LLM: {r.llm}</div>
          </div>
          <div className="flex items-center gap-4">
            <span className={`font-bold ${rc[r.type]}`}>{r.type}</span>
            <button className="btn-o text-xs px-4 py-2 rounded-xl flex items-center gap-1">⬇ Download PDF</button>
            <button className="btn-p text-xs px-4 py-2 rounded-xl flex items-center gap-1">👁 View</button>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── DASHBOARD WRAPPER ── */
function Dashboard({onNav}){
  const [tab,setTab]=useState(DASH_TABS.HOME);
  const navItems=[
    {id:DASH_TABS.HOME,label:'Diagnostics',icon:I.zap},
    {id:DASH_TABS.ANALYTICS,label:'Analytics',icon:I.chart},
    {id:DASH_TABS.RECORDS,label:'Patient Records',icon:I.users},
    {id:DASH_TABS.REPORTS,label:'Reports',icon:I.doc},
  ];
  const titles={[DASH_TABS.HOME]:'Diagnostic Dashboard',[DASH_TABS.ANALYTICS]:'Analytics Overview',[DASH_TABS.RECORDS]:'Patient Records',[DASH_TABS.REPORTS]:'Clinical Reports'};
  return(
    <div className="flex h-screen overflow-hidden" style={{background:'#0a0a0a'}}>
      {/* Sidebar */}
      <aside className="w-60 flex-shrink-0 glass border-r border-white/5 flex flex-col">
        <div className="p-5 border-b border-white/5">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg,#2dd4bf,#d9f99d)'}}><span className="text-black font-black text-sm">M</span></div>
            <div><div className="font-black tracking-tight">MammAI</div><div className="text-xs text-white/30">Diagnostic Portal</div></div>
          </div>
        </div>
        <nav className="flex-1 p-4 space-y-1">
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setTab(item.id)}
              className={`nav-lnk w-full flex items-center gap-3 px-3 py-2.5 text-sm font-semibold text-left ${tab===item.id?'active':'text-white/50'}`}>
              {item.icon}{item.label}
            </button>
          ))}
        </nav>
        <div className="p-4 border-t border-white/5">
          <div className="glass rounded-xl p-3 flex items-center gap-3">
            <div className="w-9 h-9 rounded-xl flex items-center justify-center font-black text-sm" style={{background:'linear-gradient(135deg,#2dd4bf,#d9f99d)',color:'#0a0a0a'}}>DR</div>
            <div className="flex-1 min-w-0"><div className="font-bold text-sm truncate">Dr. Radiologist</div><div className="text-xs text-white/40">DR-2025-001</div></div>
            <button onClick={()=>onNav(PAGES.LAND)} className="text-white/30 hover:text-red-400 transition-colors">{I.logout}</button>
          </div>
        </div>
      </aside>
      {/* Content */}
      <div className="flex-1 flex flex-col overflow-hidden">
        <ModelBanner/>
        <div className="glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
          <div><h1 className="text-xl font-black">{titles[tab]}</h1><p className="text-white/40 text-sm">MammAI · Parallel Dual-Stream Portal</p></div>
          <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-teal-400 animate-pulse"/><span className="text-xs text-teal-400 font-semibold">AI Pipeline Online</span></div>
        </div>
        <main className="flex-1 overflow-y-auto p-6">
          {tab===DASH_TABS.HOME&&<DiagnosticsTab/>}
          {tab===DASH_TABS.ANALYTICS&&<AnalyticsTab/>}
          {tab===DASH_TABS.RECORDS&&<RecordsTab/>}
          {tab===DASH_TABS.REPORTS&&<ReportsTab/>}
        </main>
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const [page,setPage]=useState(PAGES.LAND);
  const go=(p)=>{window.scrollTo(0,0);setPage(p);};
  return(<>
    {page===PAGES.LAND&&<Landing onNav={go}/>}
    {page===PAGES.LOGIN&&<Login onNav={go}/>}
    {page===PAGES.DASH&&<Dashboard onNav={go}/>}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
